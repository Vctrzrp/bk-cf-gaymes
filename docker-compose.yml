services:
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      API_PREFIX: api
      JWT_SECRET: ${JWT_SECRET:-development-only-change-me}
      JWT_EXPIRES_IN: 5m
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    profiles: ["database"]
    environment:
      POSTGRES_DB: crossfit_gaymes
      POSTGRES_USER: crossfit
      POSTGRES_PASSWORD: crossfit
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crossfit -d crossfit_gaymes"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
